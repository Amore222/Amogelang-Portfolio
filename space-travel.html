<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venture Past Our Sky</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['"Instrument Serif"', 'serif'],
            body: ['Barlow', 'sans-serif']
          },
          borderRadius: {
            DEFAULT: "9999px"
          }
        }
      }
    }
  </script>
  
  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
    }
    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .liquid-glass-strong {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.2) 80%,
        rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, useInView } = window.Motion;

    // Suppress benign framer motion warnings
    const originalConsoleError = console.error;
    console.error = (...args) => {
      if (typeof args[0] === 'string' && args[0].includes('Warning: Each child in a list should have a unique "key" prop.')) {
        return;
      }
      originalConsoleError.apply(console, args);
    };

    // Icons
    const ArrowUpRightIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M7 17L17 7" />
        <path d="M7 7h10v10" />
      </svg>
    );

    const PlayIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className={className}>
        <polygon points="6 4 20 12 6 20 6 4" />
      </svg>
    );

    const ClockIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="12" cy="12" r="10" />
        <path d="M12 6v6l4 2" />
      </svg>
    );

    const GlobeIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="12" cy="12" r="10" />
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
        <path d="M2 12h20" />
      </svg>
    );

    // FadingVideo Component
    const FadingVideo = ({ src, className, style }) => {
      const videoRef = useRef(null);
      const fadingOutRef = useRef(false);
      const rAFRef = useRef(null);

      const fadeTo = (targetOpacity, durationMs) => {
        if (!videoRef.current) return;
        const startOpacity = parseFloat(videoRef.current.style.opacity || '0');
        const startTime = performance.now();

        const updateFade = (time) => {
          if (!videoRef.current) return;
          const elapsed = time - startTime;
          const progress = Math.min(elapsed / durationMs, 1);
          const currentOpacity = startOpacity + (targetOpacity - startOpacity) * progress;
          videoRef.current.style.opacity = currentOpacity;

          if (progress < 1) {
            rAFRef.current = requestAnimationFrame(updateFade);
          }
        };

        if (rAFRef.current) cancelAnimationFrame(rAFRef.current);
        rAFRef.current = requestAnimationFrame(updateFade);
      };

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const onLoadedData = () => {
          video.style.opacity = 0;
          video.play().catch(e => console.log('Autoplay blocked', e));
          fadeTo(1, 500);
        };

        const onTimeUpdate = () => {
          if (!video) return;
          const timeLeft = video.duration - video.currentTime;
          if (!fadingOutRef.current && timeLeft <= 0.55 && timeLeft > 0) {
            fadingOutRef.current = true;
            fadeTo(0, 500);
          }
        };

        const onEnded = () => {
          if (!video) return;
          video.style.opacity = 0;
          setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(e => console.log('Autoplay blocked', e));
            fadingOutRef.current = false;
            fadeTo(1, 500);
          }, 100);
        };

        video.addEventListener('loadeddata', onLoadedData);
        video.addEventListener('timeupdate', onTimeUpdate);
        video.addEventListener('ended', onEnded);

        return () => {
          video.removeEventListener('loadeddata', onLoadedData);
          video.removeEventListener('timeupdate', onTimeUpdate);
          video.removeEventListener('ended', onEnded);
          if (rAFRef.current) cancelAnimationFrame(rAFRef.current);
        };
      }, []);

      return (
        <video 
          ref={videoRef}
          src={src}
          className={className}
          style={{ ...style, opacity: 0 }}
          autoPlay 
          muted 
          playsInline 
          preload="auto"
        />
      );
    };

    // BlurText Component
    const BlurText = ({ text, className }) => {
      const containerRef = useRef(null);
      const isInView = useInView(containerRef, { amount: 0.1, once: true });
      const words = text.split(' ');

      return (
        <p 
          ref={containerRef}
          className={className} 
          style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}
        >
          {words.map((word, i) => {
            const delay = i * 0.1;
            return (
              <motion.span
                key={i}
                initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
                animate={isInView ? {
                  filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                  opacity: [0, 0.5, 1],
                  y: [50, -5, 0]
                } : {}}
                transition={{
                  duration: 0.7,
                  times: [0, 0.5, 1],
                  ease: "easeOut",
                  delay: delay
                }}
                style={{ display: 'inline-block', marginRight: '0.28em' }}
              >
                {word}
              </motion.span>
            );
          })}
        </p>
      );
    };

    // Hero Section
    const HeroSection = () => {
      return (
        <section className="relative w-full h-screen bg-black overflow-hidden flex flex-col">
          <FadingVideo 
            src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_080021_d598092b-c4c2-4e53-8e46-94cf9064cd50.mp4"
            className="absolute left-1/2 top-0 -translate-x-1/2 object-cover object-top z-0"
            style={{ width: "120%", height: "120%" }}
          />

          <div className="relative z-10 flex-1 flex flex-col">
            {/* Navbar */}
            <nav className="fixed top-4 left-0 right-0 px-8 lg:px-16 z-50 flex items-center justify-between pointer-events-none">
              <div className="w-12 h-12 liquid-glass flex items-center justify-center pointer-events-auto">
                <span className="font-heading italic lowercase text-white text-3xl mt-1">a</span>
              </div>
              
              <div className="hidden desktop:flex md:flex liquid-glass items-center px-1.5 py-1.5 pointer-events-auto">
                {['Home', 'Voyages', 'Worlds', 'Innovation', 'Plan Launch'].map((link) => (
                  <a key={link} href="#" className="px-3 py-2 text-sm font-medium text-white/90 font-body hover:text-white transition-colors">
                    {link}
                  </a>
                ))}
                <button className="bg-white text-black px-4 py-2 text-sm font-medium whitespace-nowrap flex items-center gap-1.5 ml-2 transition-transform hover:scale-105 active:scale-95">
                  Claim a Spot <ArrowUpRightIcon className="w-4 h-4" />
                </button>
              </div>

              <div className="w-12 h-12 invisible"></div>
            </nav>

            {/* Hero Content */}
            <div className="flex-1 flex flex-col items-center justify-center pt-24 px-4 text-center">
              <motion.div
                initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
                animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
                transition={{ duration: 0.8, ease: "easeOut", delay: 0.4 }}
                className="liquid-glass flex items-center p-1.5 pr-4 mb-6"
              >
                <span className="bg-white text-black px-3 py-1 text-xs font-semibold mr-3">New</span>
                <span className="text-sm text-white/90 font-body">Maiden Crewed Voyage to Mars Arrives 2026</span>
              </motion.div>

              <BlurText 
                text="Venture Past Our Sky Across the Universe"
                className="text-6xl md:text-7xl lg:text-[5.5rem] font-heading italic text-white leading-[0.8] max-w-2xl tracking-[-4px]"
              />

              <motion.p
                initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
                animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
                transition={{ duration: 0.8, ease: "easeOut", delay: 0.8 }}
                className="mt-4 text-sm md:text-base text-white max-w-2xl font-body font-light leading-tight"
              >
                Discover the universe in ways once unimaginable. Our pioneering vessels and breakthrough engineering bring deep-space exploration within reach—secure and extraordinary.
              </motion.p>

              <motion.div
                initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
                animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
                transition={{ duration: 0.8, ease: "easeOut", delay: 1.1 }}
                className="flex items-center gap-6 mt-6"
              >
                <button className="liquid-glass-strong px-5 py-2.5 text-sm font-medium text-white flex items-center gap-2 transition-transform hover:scale-105 active:scale-95">
                  Start Your Voyage <ArrowUpRightIcon className="w-5 h-5" />
                </button>
                <button className="text-white text-sm font-medium flex items-center gap-2 hover:opacity-80 transition-opacity">
                  View Liftoff <PlayIcon className="w-4 h-4" />
                </button>
              </motion.div>

              <motion.div
                initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
                animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
                transition={{ duration: 0.8, ease: "easeOut", delay: 1.3 }}
                className="flex items-stretch gap-4 mt-8"
              >
                <div className="liquid-glass p-5 w-[220px] rounded-[1.25rem] flex flex-col text-left">
                  <ClockIcon className="w-7 h-7 text-white mb-6" />
                  <div className="font-heading italic text-white text-4xl tracking-[-1px] leading-none">34.5 Min</div>
                  <div className="text-xs text-white font-body font-light mt-2">Average Videos Watch Time</div>
                </div>
                <div className="liquid-glass p-5 w-[220px] rounded-[1.25rem] flex flex-col text-left">
                  <GlobeIcon className="w-7 h-7 text-white mb-6" />
                  <div className="font-heading italic text-white text-4xl tracking-[-1px] leading-none">2.8B+</div>
                  <div className="text-xs text-white font-body font-light mt-2">Users Across the Globe</div>
                </div>
              </motion.div>
            </div>

            {/* Partners */}
            <motion.div
              initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
              animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
              transition={{ duration: 0.8, ease: "easeOut", delay: 1.4 }}
              className="flex flex-col items-center gap-4 pb-8 mt-auto"
            >
              <div className="liquid-glass px-3.5 py-1 text-xs font-medium text-white">
                Collaborating with top aerospace pioneers globally
              </div>
              <div className="flex items-center gap-12 md:gap-16 font-heading italic text-white text-2xl md:text-3xl tracking-tight">
                <span>Aeon</span>
                <span>Vela</span>
                <span>Apex</span>
                <span>Orbit</span>
                <span>Zeno</span>
              </div>
            </motion.div>
          </div>
        </section>
      );
    };

    // Capabilities Section
    const CapabilitiesSection = () => {
      const cards = [
        {
          icon: <path d="M5 21q-.825 0-1.412-.587T3 19V5q0-.825.588-1.412T5 3h14q.825 0 1.413.588T21 5v14q0 .825-.587 1.413T19 21H5Zm1-4h12l-3.75-5-3 4L9 13l-3 4Z" />,
          tags: ["Natural Context", "Photo Realism", "Infinite Settings", "Eco-Vibe"],
          title: "AI Scenery",
          body: "AI analyzes your product to create indistinguishable natural environments — from Icelandic cliffs to misty forests."
        },
        {
          icon: <path d="M4 6.47 5.76 10H20v8H4V6.47M22 4h-4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.89-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4Z" />,
          tags: ["Scale Fast", "Visual Consistency", "Time Saver", "Ready to Post"],
          title: "Batch Production",
          body: "Style your entire product line in minutes. Create a unified visual identity for catalogues and social media without weeks of retouching."
        },
        {
          icon: <path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1Zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7Z" />,
          tags: ["Ray Tracing", "Physical Shadows", "Studio Quality", "Sunlight Sync"],
          title: "Smart Lighting",
          body: "Automatic lighting and material adjustment. Achieve flawless integration with realistic shadows and sunlight."
        }
      ];

      return (
        <section className="relative w-full min-h-screen bg-black flex flex-col">
          <FadingVideo 
            src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_094631_d30ab262-45ee-4b7d-99f3-5d5848c8ef13.mp4"
            className="absolute inset-0 w-full h-full object-cover z-0"
          />

          <div className="relative z-10 px-8 md:px-16 lg:px-20 pt-24 pb-10 flex flex-col min-h-screen">
            <div className="mb-auto">
              <div className="text-sm font-body text-white/80 mb-6">// Capabilities</div>
              <h2 className="font-heading italic text-white text-6xl md:text-7xl lg:text-[6rem] leading-[0.9] tracking-[-3px]">
                Production<br/>evolved
              </h2>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-16">
              {cards.map((card, idx) => (
                <motion.div 
                  key={idx}
                  initial={{ opacity: 0, y: 30 }}
                  whileInView={{ opacity: 1, y: 0 }}
                  viewport={{ once: true, margin: "50px" }}
                  transition={{ duration: 0.6, delay: idx * 0.1 }}
                  className="liquid-glass rounded-[1.25rem] p-6 min-h-[360px] flex flex-col"
                >
                  <div className="flex items-start justify-between gap-4">
                    <div className="w-11 h-11 liquid-glass rounded-[0.75rem] flex items-center justify-center shrink-0">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" className="h-6 w-6 fill-white">
                        {card.icon}
                      </svg>
                    </div>
                    <div className="flex flex-wrap justify-end gap-1.5 max-w-[70%]">
                      {card.tags.map(tag => (
                        <span key={tag} className="liquid-glass px-3 py-1 text-[11px] text-white/90 font-body whitespace-nowrap">
                          {tag}
                        </span>
                      ))}
                    </div>
                  </div>

                  <div className="mt-auto pt-6">
                    <h3 className="font-heading italic text-white text-3xl md:text-4xl tracking-[-1px] leading-none">
                      {card.title}
                    </h3>
                    <p className="mt-3 text-sm text-white/90 font-body font-light leading-snug max-w-[32ch]">
                      {card.body}
                    </p>
                  </div>
                </motion.div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    // Main App Component
    const App = () => {
      return (
        <div className="font-body selection:bg-white selection:text-black">
          <HeroSection />
          <CapabilitiesSection />
        </div>
      );
    };

    // Render to DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
